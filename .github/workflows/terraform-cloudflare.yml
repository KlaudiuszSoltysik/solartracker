name: 'Terraform Cloudflare Deploy'

on:
  push:
    branches:
      - master
    paths:
      - 'infrastructure/terraform/cloudflare/**'

jobs:
  terraform:
    name: 'Deploy Tunnel'
    runs-on: k8s-infra-runner
    
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_ID }}
      TF_VAR_tunnel_secret: ${{ secrets.TF_VAR_TUNNEL_SECRET }}

    defaults:
      run:
        working-directory: ./infrastructure/terraform/cloudflare

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Terraform manually
      run: |
        sudo apt-get update && sudo apt-get install -y gnupg software-properties-common wget
        wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor --yes --batch --no-tty -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com jammy main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt-get update && sudo apt-get install -y terraform

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: terraform apply -auto-approve