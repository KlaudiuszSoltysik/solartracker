apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: keycloak
    targetRevision: "25.2.0"
    helm:
      values: |
        global:
          imageRegistry: "public.ecr.aws"
          security:
            allowInsecureImages: true
        auth:
          adminUser: admin
          existingSecret: "keycloak-creds"
        production: true 
        proxy: edge
        ingress:
          enabled: false
        extraEnvVars:
          - name: KC_HOSTNAME
            value: "auth.260824.xyz"
          - name: KC_PROXY
            value: "edge"
        postgresql:
          enabled: true
          auth:
            username: "keycloak"
            database: "keycloak_db"
            existingSecret: "keycloak-creds"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: infrastructure
  syncPolicy:
    automated:
      prune: true
      selfHeal: true