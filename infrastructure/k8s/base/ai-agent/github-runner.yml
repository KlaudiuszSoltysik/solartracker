apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-runner
  namespace: ai-agent
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ai-agent-runner
  template:
    metadata:
      labels:
        app: ai-agent-runner
    spec:
      serviceAccountName: ai-agent-sa
      containers:
      - name: runner
        image: myoung34/github-runner:ubuntu-jammy
        env:
        - name: REPO_URL
          value: "https://github.com/klaudiuszsoltysik/solartracker"
        - name: RUNNER_NAME
          value: "ai-agent-runner"
        - name: RUNNER_LABELS
          value: "k8s-ai-agent"
        - name: ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: ai-agent-creds
              key: github-token