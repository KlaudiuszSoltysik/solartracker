apiVersion: v1
data:
  init.sql: |-
    create table forecast
    (
        time           timestamp with time zone not null,
        device_id      text                     not null,
        power_w        double precision         not null,
        irradiance_wm2 double precision,
        temp_c         double precision,
        wind_speed_mps double precision,
        forecasted_at  timestamp with time zone not null,
        constraint uq_predictions_time_device
            unique (time, device_id)
    );

    alter table forecast
        owner to admin;

    create index predictions_time_idx
        on forecast (time desc);

    create index ix_predictions_device_time
        on forecast (device_id asc, time desc);

    create table telemetry
    (
        time           timestamp with time zone not null,
        device_id      text                     not null,
        voltage_v      double precision,
        current_a      double precision,
        irradiance_wm2 double precision,
        temp_c         double precision,
        yaw_angle_deg  double precision,
        status         text
    );

    alter table telemetry
        owner to admin;

    create index telemetry_time_idx
        on telemetry (time desc);

    create index ix_device_time
        on telemetry (device_id asc, time desc);
kind: ConfigMap
metadata:
  name: timescaledb-init-scripts
  namespace: default
