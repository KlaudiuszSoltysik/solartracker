apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 58.*
    helm:
      values: |
        prometheus:
          prometheusSpec:
            scrapeInterval: "30s"
            retention: "48h"
        grafana:
          sidecar:
            datasources:
              enabled: true
          additionalDataSources:
            - name: Prometheus
              type: prometheus
              url: http://prometheus-stack-kube-prom-prometheus.observability:9090
              access: proxy
              isDefault: true
            - name: Loki
              type: loki
              url: http://loki-stack.observability:3100
              access: proxy
          
          admin:
            existingSecret: "grafana-creds"
            userKey: username
            passwordKey: password
  destination:
    server: "https://kubernetes.default.svc"
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true