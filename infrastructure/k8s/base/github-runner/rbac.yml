apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-runner-sa
  namespace: infrastructure
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infra-runner-tf-role
  namespace: infrastructure
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infra-runner-tf-binding
  namespace: infrastructure
subjects:
- kind: ServiceAccount
  name: infra-runner-sa
  namespace: infrastructure
roleRef:
  kind: Role
  name: infra-runner-tf-role
  apiGroup: rbac.authorization.k8s.io